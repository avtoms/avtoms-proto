syntax = "proto3";

package avtoms.workorder.v1;

option go_package = "github.com/avtoms/proto/gen/go/avtoms/workorder/v1;workorderv1";

// WorkOrderService owns work orders, line items, the pricing menu, and time tracking (M3 + M4 + M5).
service WorkOrderService {
  rpc CreateWorkOrder(CreateWorkOrderRequest) returns (WorkOrder);
  rpc GetWorkOrder(GetWorkOrderRequest) returns (WorkOrder);
  rpc AddLineItem(AddLineItemRequest) returns (WorkOrder);
  rpc RemoveLineItem(RemoveLineItemRequest) returns (WorkOrder);
  rpc TransitionState(TransitionStateRequest) returns (WorkOrder);
  rpc AssignMechanic(AssignMechanicRequest) returns (WorkOrder);

  rpc StartTimer(StartTimerRequest) returns (TimeEntry);
  rpc StopTimer(StopTimerRequest) returns (TimeEntry);

  rpc ListMenuItems(ListMenuItemsRequest) returns (ListMenuItemsResponse);
  rpc CreateMenuItem(CreateMenuItemRequest) returns (MenuItem);

  rpc ListWorkOrders(ListWorkOrdersRequest) returns (ListWorkOrdersResponse);

  // Per-shop pricing policy (currently the negotiated-discount cap).
  rpc GetShopSettings(GetShopSettingsRequest) returns (ShopSettings);
  rpc UpdateShopSettings(UpdateShopSettingsRequest) returns (ShopSettings);

  // Parts inventory.
  rpc ListParts(ListPartsRequest) returns (ListPartsResponse);
  rpc CreatePart(CreatePartRequest) returns (Part);
  rpc AdjustStock(AdjustStockRequest) returns (Part);

  // Appointments / scheduling.
  rpc ListAppointments(ListAppointmentsRequest) returns (ListAppointmentsResponse);
  rpc CreateAppointment(CreateAppointmentRequest) returns (Appointment);
  rpc SetAppointmentState(SetAppointmentStateRequest) returns (Appointment);

  // Per-work-order audit trail.
  rpc GetAuditLog(GetAuditLogRequest) returns (GetAuditLogResponse);

  // Service reminders (next oil change, inspection due, etc.).
  rpc ListServiceReminders(ListServiceRemindersRequest) returns (ListServiceRemindersResponse);
  rpc CreateServiceReminder(CreateServiceReminderRequest) returns (ServiceReminder);
  rpc SetServiceReminderState(SetServiceReminderStateRequest) returns (ServiceReminder);

  // Cross-shop due-queries + dedup, used by the notification scheduler to push reminders.
  rpc ListDueReminders(ListDueRemindersRequest) returns (ListServiceRemindersResponse);
  rpc MarkReminderNotified(MarkNotifiedRequest) returns (MarkNotifiedResponse);
  rpc ListDueAppointments(ListDueAppointmentsRequest) returns (ListAppointmentsResponse);
  rpc MarkAppointmentReminded(MarkNotifiedRequest) returns (MarkNotifiedResponse);

  // Shop overhead expenses + profit-and-loss.
  rpc ListShopExpenses(ListShopExpensesRequest) returns (ListShopExpensesResponse);
  rpc CreateShopExpense(CreateShopExpenseRequest) returns (ShopExpense);
  rpc DeleteShopExpense(DeleteShopExpenseRequest) returns (DeleteShopExpenseResponse);
  rpc GetProfitAndLoss(GetProfitAndLossRequest) returns (ProfitAndLoss);

  // Warranties on completed work (months / km coverage per vehicle).
  rpc ListWarranties(ListWarrantiesRequest) returns (ListWarrantiesResponse);
  rpc CreateWarranty(CreateWarrantyRequest) returns (Warranty);
  rpc VoidWarranty(VoidWarrantyRequest) returns (Warranty);

  // Customer estimate approval via a shareable token (e.g. a Telegram deep link).
  rpc CreateApprovalLink(CreateApprovalLinkRequest) returns (ApprovalLink);
  rpc ResolveApproval(ResolveApprovalRequest) returns (ApprovalInfo);
  rpc DecideApproval(DecideApprovalRequest) returns (ApprovalInfo);
}

enum ApprovalStatus {
  APPROVAL_STATUS_UNSPECIFIED = 0;
  APPROVAL_STATUS_PENDING = 1;
  APPROVAL_STATUS_APPROVED = 2;
  APPROVAL_STATUS_DECLINED = 3;
}
// ApprovalLink is a freshly minted token for a work order's estimate.
message ApprovalLink {
  string token = 1;
  string work_order_id = 2;
}
// ApprovalInfo describes an approval token + a short estimate summary for display.
message ApprovalInfo {
  string token = 1;
  string work_order_id = 2;
  ApprovalStatus status = 3;
  int64 total = 4;            // estimate total (tiyin)
  int32 line_item_count = 5;
}
message CreateApprovalLinkRequest {
  string work_order_id = 1;
}
message ResolveApprovalRequest {
  string token = 1;
}
message DecideApprovalRequest {
  string token = 1;
  bool approved = 2;
}

// Warranty covers a repair/part for a period (months) and/or distance (km) from a start date.
message Warranty {
  string id = 1;
  string shop_id = 2;
  string vehicle_id = 3;     // the covered vehicle
  string work_order_id = 4;  // optional originating work order
  string title = 5;          // what is covered, e.g. "Brake pads", "Engine rebuild"
  int32 months = 6;          // coverage length in months (0 = none)
  int64 km_limit = 7;        // coverage distance in km (0 = none)
  string starts_on = 8;      // RFC3339 date coverage began
  string expires_on = 9;     // RFC3339 date coverage ends (computed: starts_on + months)
  string note = 10;
  bool voided = 11;
  string created_at = 12;
}
message ListWarrantiesRequest {
  string shop_id = 1;
  string vehicle_id = 2; // optional filter (a vehicle's warranties)
}
message ListWarrantiesResponse {
  repeated Warranty warranties = 1;
}
message CreateWarrantyRequest {
  string shop_id = 1;
  string vehicle_id = 2;
  string work_order_id = 3;
  string title = 4;
  int32 months = 5;
  int64 km_limit = 6;
  string starts_on = 7; // optional; defaults to now
  string note = 8;
}
message VoidWarrantyRequest {
  string id = 1;
}

// ShopExpense is a shop overhead cost (rent, salary, utilities, ...), distinct from
// the per-work-order material/part costs already tracked on line items.
message ShopExpense {
  string id = 1;
  string shop_id = 2;
  string category = 3;    // rent, salary, utilities, supplies, tax, other
  int64 amount = 4;       // tiyin
  string incurred_on = 5; // RFC3339 date the cost was incurred
  string note = 6;
  string created_at = 7;
  string staff_id = 8;    // optional: the worker this cost is for (e.g. whose salary)
}
message ListShopExpensesRequest {
  string shop_id = 1;
  string from = 2; // RFC3339 lower bound (optional)
  string to = 3;   // RFC3339 upper bound (optional)
}
message ListShopExpensesResponse {
  repeated ShopExpense expenses = 1;
}
message CreateShopExpenseRequest {
  string shop_id = 1;
  string category = 2;
  int64 amount = 3;
  string incurred_on = 4;
  string note = 5;
  string staff_id = 6; // optional: worker this expense is for
}
message DeleteShopExpenseRequest {
  string id = 1;
}
message DeleteShopExpenseResponse {
  bool deleted = 1;
}

// ExpenseBucket is one category's total in a P&L.
message ExpenseBucket {
  string category = 1;
  int64 amount = 2;
}
// ProfitAndLoss summarizes a period's economics for a shop.
message ProfitAndLoss {
  string shop_id = 1;
  string from = 2;
  string to = 3;
  int64 revenue = 4;        // sum of work-order subtotals (pre-VAT) for invoiced/closed orders in range
  int64 cost_of_goods = 5;  // sum of line-item costs (parts/materials) on those orders
  int64 gross_margin = 6;   // revenue - cost_of_goods
  int64 overhead = 7;       // sum of shop expenses in range
  int64 net_profit = 8;     // gross_margin - overhead
  int32 work_order_count = 9;
  repeated ExpenseBucket by_category = 10; // overhead broken down by category
}
message GetProfitAndLossRequest {
  string shop_id = 1;
  string from = 2; // RFC3339 lower bound (optional)
  string to = 3;   // RFC3339 upper bound (optional)
}

enum ServiceReminderState {
  SERVICE_REMINDER_STATE_UNSPECIFIED = 0;
  SERVICE_REMINDER_STATE_PENDING = 1;
  SERVICE_REMINDER_STATE_DONE = 2;
  SERVICE_REMINDER_STATE_DISMISSED = 3;
}

// ServiceReminder is a future maintenance reminder for a vehicle (oil change,
// technical inspection, timing-belt, insurance renewal, ...).
message ServiceReminder {
  string id = 1;
  string shop_id = 2;
  string vehicle_id = 3;     // optional link to a vehicle
  string customer_name = 4;  // denormalized for display / SMS
  string phone = 5;          // denormalized for SMS
  string plate = 6;          // free-text plate for quick display
  string title = 7;          // e.g. "Oil change", "Technical inspection"
  string due_date = 8;       // RFC3339 date the service is due (optional)
  int64 due_mileage = 9;     // odometer target in km (optional, 0 = none)
  string notes = 10;
  ServiceReminderState state = 11;
  string created_at = 12;
}
message ListServiceRemindersRequest {
  string shop_id = 1;
  string vehicle_id = 2; // optional filter (a vehicle's reminders)
}
message ListServiceRemindersResponse {
  repeated ServiceReminder reminders = 1;
}
message CreateServiceReminderRequest {
  string shop_id = 1;
  string vehicle_id = 2;
  string customer_name = 3;
  string phone = 4;
  string plate = 5;
  string title = 6;
  string due_date = 7;
  int64 due_mileage = 8;
  string notes = 9;
}
message SetServiceReminderStateRequest {
  string id = 1;
  ServiceReminderState state = 2;
}
message ListDueRemindersRequest {
  string now = 1; // RFC3339; pending reminders with due_date <= now and not yet notified
}
message ListDueAppointmentsRequest {
  string from = 1; // RFC3339; scheduled appointments within [from, to] not yet reminded
  string to = 2;
}
message MarkNotifiedRequest {
  string id = 1;
}
message MarkNotifiedResponse {
  bool ok = 1;
}

// AuditEntry records one change to a work order.
message AuditEntry {
  string id = 1;
  string work_order_id = 2;
  string actor_id = 3;   // staff id who made the change (from the gateway), may be empty
  string action = 4;     // e.g. "state", "line_added", "line_removed", "mechanic_assigned"
  string detail = 5;     // human-readable detail
  string created_at = 6; // RFC3339
}
message GetAuditLogRequest {
  string work_order_id = 1;
}
message GetAuditLogResponse {
  repeated AuditEntry entries = 1;
}

enum AppointmentState {
  APPOINTMENT_STATE_UNSPECIFIED = 0;
  APPOINTMENT_STATE_SCHEDULED = 1;
  APPOINTMENT_STATE_DONE = 2;
  APPOINTMENT_STATE_CANCELED = 3;
}

// Appointment is a booked job slot.
message Appointment {
  string id = 1;
  string shop_id = 2;
  string title = 3;             // service / reason
  string customer_name = 4;     // free text (walk-in or denormalized)
  string phone = 5;
  string vehicle_id = 6;        // optional link to a vehicle
  string plate = 7;             // free-text plate for quick display
  string mechanic_id = 8;       // optional assigned mechanic
  string scheduled_at = 9;      // RFC3339
  int32 duration_minutes = 10;
  AppointmentState state = 11;
  string notes = 12;
}
message ListAppointmentsRequest {
  string shop_id = 1;
  string from = 2; // RFC3339 lower bound (optional)
  string to = 3;   // RFC3339 upper bound (optional)
}
message ListAppointmentsResponse {
  repeated Appointment appointments = 1;
}
message CreateAppointmentRequest {
  string shop_id = 1;
  string title = 2;
  string customer_name = 3;
  string phone = 4;
  string vehicle_id = 5;
  string plate = 6;
  string mechanic_id = 7;
  string scheduled_at = 8;
  int32 duration_minutes = 9;
  string notes = 10;
}
message SetAppointmentStateRequest {
  string id = 1;
  AppointmentState state = 2;
}

// Part is an inventory item the shop stocks (a real, counted part/material).
message Part {
  string id = 1;
  string shop_id = 2;
  string name = 3;
  string sku = 4;             // optional stock-keeping unit / article number
  string unit = 5;            // unit of measure: dona, litr, kg, ...
  double quantity_on_hand = 6;
  double reorder_level = 7;   // low-stock threshold; below this it's flagged
  int64 unit_cost = 8;        // buy price per unit (tiyin)
  int64 unit_price = 9;       // sell price per unit (tiyin)
  string supplier = 10;       // optional supplier/vendor name
  bool active = 11;
}
message ListPartsRequest {
  string shop_id = 1;
}
message ListPartsResponse {
  repeated Part parts = 1;
}
message CreatePartRequest {
  string shop_id = 1;
  string name = 2;
  string sku = 3;
  string unit = 4;
  double quantity_on_hand = 5;
  double reorder_level = 6;
  int64 unit_cost = 7;
  int64 unit_price = 8;
  string supplier = 9;
}
message AdjustStockRequest {
  string part_id = 1;
  double delta = 2;    // positive = receive stock, negative = consume/correct
  string reason = 3;   // free-text note (e.g. "received", "used", "stocktake")
}

// ShopSettings holds per-shop pricing policy.
message ShopSettings {
  string shop_id = 1;
  // Maximum discount a mechanic may apply to a menu-priced line, in percent (0-100).
  // 100 means no cap (the opt-in default). Owners/admins always bypass the cap.
  int32 max_discount_percent = 2;
}
message GetShopSettingsRequest {
  string shop_id = 1;
}
message UpdateShopSettingsRequest {
  string shop_id = 1;
  int32 max_discount_percent = 2;
}

message ListWorkOrdersRequest {
  string shop_id = 1;
  WorkOrderState state = 2; // optional filter; UNSPECIFIED (0) returns all
  string assigned_mechanic_id = 3; // optional filter (for mechanic kanban)
  string vehicle_id = 4; // optional filter — a vehicle's service history
}
message ListWorkOrdersResponse {
  repeated WorkOrder work_orders = 1;
}

enum WorkOrderState {
  WORK_ORDER_STATE_UNSPECIFIED = 0;
  WORK_ORDER_STATE_DRAFT = 1;
  WORK_ORDER_STATE_ESTIMATED = 2;
  WORK_ORDER_STATE_APPROVED = 3;
  WORK_ORDER_STATE_IN_PROGRESS = 4;
  WORK_ORDER_STATE_READY = 5;
  WORK_ORDER_STATE_INVOICED = 6;
  WORK_ORDER_STATE_CLOSED = 7;
  WORK_ORDER_STATE_CANCELED = 8;
}

enum LineItemKind {
  LINE_ITEM_KIND_UNSPECIFIED = 0;
  LINE_ITEM_KIND_LABOR = 1; // deprecated alias kept for backward compatibility; prefer SERVICE
  LINE_ITEM_KIND_PART = 2;  // deprecated alias kept for backward compatibility; prefer MATERIAL
  LINE_ITEM_KIND_SERVICE = 3;  // a repair service performed (price negotiable per customer)
  LINE_ITEM_KIND_MATERIAL = 4; // a material/tool/part consumed during the repair (an expense)
}

message LineItem {
  string id = 1;
  LineItemKind kind = 2;
  string description = 3;
  // What the customer is charged per unit, in minor units (tiyin). For a SERVICE this is the
  // agreed/negotiated price, which may be below the menu default (see default_price).
  int64 unit_price = 4;
  int32 quantity = 5;
  // The shop's expense (buy/cost price) per unit, in tiyin. 0 when not tracked.
  // Per-line margin is (unit_price - cost) * quantity.
  int64 cost = 6;
  // Optional source menu item this line was created from (empty for ad-hoc lines).
  string menu_item_id = 7;
  // Snapshot of the menu item's default_price when the line was added, in tiyin.
  // Enables a negotiation/discount audit: discount = (default_price - unit_price) * quantity.
  int64 default_price = 8;
}

message WorkOrder {
  string id = 1;
  string shop_id = 2;
  string vehicle_id = 3;
  string assigned_mechanic_id = 4;
  WorkOrderState state = 5;
  repeated LineItem line_items = 6;
  int64 subtotal = 7;
  int64 vat = 8;
  int64 total = 9;
  string notes = 10;
  string created_at = 11;
  // Set when a timer is currently running on this work order (the open time entry's start).
  string active_timer_started_at = 12;
  // Denormalized vehicle + customer info, filled by the gateway for display (read-only).
  string plate = 13;
  string make = 14;
  string model = 15;
  string customer_name = 16;
  // Sum of cost*quantity across line items, in tiyin: the shop's total expense on this order.
  int64 total_cost = 17;
  // Gross margin before VAT, in tiyin: subtotal - total_cost.
  int64 total_margin = 18;
  // Human-friendly per-shop sequential order number (1, 2, 3, …). Shown to users as
  // "Z-0001"; the UUID id stays the internal/API identifier.
  int64 order_no = 19;
}

message TimeEntry {
  string id = 1;
  string work_order_id = 2;
  string mechanic_id = 3;
  string started_at = 4;
  string stopped_at = 5;
}

// MenuMaterial is a part/material a service is expected to consume (a bill-of-materials
// entry on a service template). Reference/spec data shown in the catalog; not auto-billed.
message MenuMaterial {
  string name = 1;
  double quantity = 2;  // amount, may be fractional (e.g. 4.5)
  int64 unit_cost = 3;  // shop expense per unit, in tiyin
  int64 unit_price = 4; // optional retail price per unit, in tiyin
  string unit = 5;      // free-text unit of measure: litr, kg, dona, metr, ...
}

message MenuItem {
  string id = 1;
  string shop_id = 2;
  string name_uz_latn = 3;
  string name_uz_cyrl = 4;
  string name_ru = 5;
  int64 default_price = 6;
  bool active = 7;
  // Default shop expense (cost) for this menu item per unit, in tiyin. 0 when not tracked.
  // Seeds a line item's cost when it is created from this menu item.
  int64 default_cost = 8;
  // Service template details (real "canned job"): category, estimated labour time, and the
  // materials the repair is expected to need.
  string category = 9;
  int32 estimated_minutes = 10;
  repeated MenuMaterial materials = 11;
}

message CreateWorkOrderRequest {
  string shop_id = 1;
  string vehicle_id = 2;
}
message GetWorkOrderRequest {
  string id = 1;
}
message AddLineItemRequest {
  string work_order_id = 1;
  LineItem line_item = 2;
  // Set by the gateway from the caller's role (owner/admin) to bypass the per-shop
  // discount cap. Not set by end clients.
  bool allow_discount_override = 3;
}
message RemoveLineItemRequest {
  string work_order_id = 1;
  string line_item_id = 2;
}
message TransitionStateRequest {
  string work_order_id = 1;
  WorkOrderState target = 2;
}
message AssignMechanicRequest {
  string work_order_id = 1;
  string mechanic_id = 2;
}
message StartTimerRequest {
  string work_order_id = 1;
  string mechanic_id = 2;
}
message StopTimerRequest {
  string work_order_id = 1;
  string mechanic_id = 2;
}
message ListMenuItemsRequest {
  string shop_id = 1;
}
message ListMenuItemsResponse {
  repeated MenuItem items = 1;
}
message CreateMenuItemRequest {
  string shop_id = 1;
  string name_uz_latn = 2;
  string name_uz_cyrl = 3;
  string name_ru = 4;
  int64 default_price = 5;
  int64 default_cost = 6; // optional default shop expense per unit, in tiyin
  string category = 7;
  int32 estimated_minutes = 8;
  repeated MenuMaterial materials = 9; // materials this service is expected to need
}
