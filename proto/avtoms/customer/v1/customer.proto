syntax = "proto3";

package avtoms.customer.v1;

import "avtoms/common/v1/common.proto";

option go_package = "github.com/avtoms/proto/gen/go/avtoms/customer/v1;customerv1";

// CustomerService owns customers and vehicles (M2).
service CustomerService {
  rpc CreateCustomer(CreateCustomerRequest) returns (Customer);
  rpc GetCustomer(GetCustomerRequest) returns (Customer);
  rpc UpdateCustomer(UpdateCustomerRequest) returns (Customer);
  rpc CreateVehicle(CreateVehicleRequest) returns (Vehicle);
  rpc GetVehicle(GetVehicleRequest) returns (Vehicle);
  rpc UpdateVehicle(UpdateVehicleRequest) returns (Vehicle);
  rpc DeleteVehicle(DeleteVehicleRequest) returns (Vehicle);
  rpc ListVehicles(ListVehiclesRequest) returns (ListVehiclesResponse);
  rpc ListVehiclesByShop(ListVehiclesByShopRequest) returns (ListVehiclesResponse);
  rpc SearchByPlate(SearchByPlateRequest) returns (SearchByPlateResponse);
  rpc SoftDeleteCustomer(SoftDeleteCustomerRequest) returns (Customer);
  rpc ListCustomers(ListCustomersRequest) returns (ListCustomersResponse);

  // Client Telegram linking: a customer links their Telegram chat (by sharing their
  // verified phone) so the bot can show their orders and push notifications.
  rpc LinkTelegram(LinkTelegramRequest) returns (TelegramLink);
  rpc GetTelegramLink(GetTelegramLinkRequest) returns (TelegramLink);
  rpc GetTelegramLinkByPhone(GetTelegramLinkByPhoneRequest) returns (TelegramLink);
  rpc ListCustomersByTelegram(ListCustomersByTelegramRequest) returns (ListCustomersResponse);

  // Car reference catalog (global, admin-managed). Read by any role to populate dropdowns.
  rpc ListCarMakes(ListCarMakesRequest) returns (ListCarMakesResponse);
  rpc CreateCarMake(CreateCarMakeRequest) returns (CarMake);
  rpc UpdateCarMake(UpdateCarMakeRequest) returns (CarMake);
  rpc ListCarModels(ListCarModelsRequest) returns (ListCarModelsResponse);
  rpc CreateCarModel(CreateCarModelRequest) returns (CarModel);
}

// CarMake is a vehicle manufacturer (e.g. Chevrolet). Global reference data.
message CarMake {
  string id = 1;
  string name = 2;
  string country = 3;
  string logo_url = 4; // brand emblem uploaded by the super admin, shown across the app
}

// CarModel belongs to a make (e.g. Cobalt) with an optional body type.
message CarModel {
  string id = 1;
  string make_id = 2;
  string name = 3;
  string body_type = 4; // sedan | hatchback | suv | minivan | pickup | other
}

message ListCarMakesRequest {}
message ListCarMakesResponse {
  repeated CarMake makes = 1;
}
message CreateCarMakeRequest {
  string name = 1;
  string country = 2;
}
message UpdateCarMakeRequest {
  string id = 1;
  string name = 2;
  string country = 3;
  string logo_url = 4;
}
message ListCarModelsRequest {
  string make_id = 1; // optional; empty returns all models
}
message ListCarModelsResponse {
  repeated CarModel models = 1;
}
message CreateCarModelRequest {
  string make_id = 1;
  string name = 2;
  string body_type = 3;
}

message ListCustomersRequest {
  string shop_id = 1;
  string query = 2; // optional name/phone filter
}
message ListCustomersResponse {
  repeated Customer customers = 1;
}

message Customer {
  string id = 1;
  string shop_id = 2;
  string phone = 3;
  string name = 4;
  avtoms.common.v1.Language language = 5;
  string telegram_handle = 6;
  bool walk_in = 7;
  bool deleted = 8;
  string created_at = 9;
  string telegram_chat_id = 10; // linked Telegram chat (numeric id), empty until linked
  string notes = 11;
  string email = 12;
  string address = 13;
  string birthday = 14; // YYYY-MM-DD (optional)
}

// TelegramLink maps a verified phone to a Telegram chat + preferred language.
message TelegramLink {
  string chat_id = 1;
  string phone = 2;
  avtoms.common.v1.Language language = 3;
  bool linked = 4; // false when no link exists for the queried chat
}
message LinkTelegramRequest {
  string chat_id = 1;
  string phone = 2;
  avtoms.common.v1.Language language = 3;
}
message GetTelegramLinkRequest {
  string chat_id = 1;
}
message GetTelegramLinkByPhoneRequest {
  string phone = 1;
}
message ListCustomersByTelegramRequest {
  string chat_id = 1;
}

// PlateType is the Uzbek number-plate category, which drives validation and the plate
// design (colours). UNSPECIFIED is treated as STANDARD.
enum PlateType {
  PLATE_TYPE_UNSPECIFIED = 0;
  PLATE_TYPE_STANDARD = 1; // white, "01 A 123 BC"
  PLATE_TYPE_ELECTRIC = 2; // white with a green region box, same format as standard
  PLATE_TYPE_FOREIGN = 3;  // yellow, "01 H 123456" (region + H + 6 digits)
  PLATE_TYPE_MOPED = 4;    // square, "123 ABC" (3 digits + 3 letters)
}

message Vehicle {
  string id = 1;
  string customer_id = 2;
  string plate = 3;
  string vin = 4;
  string make = 5;
  string model = 6;
  int32 year = 7;
  int64 mileage = 8;
  bool deleted = 9;
  PlateType plate_type = 10;
  string color = 11;
  string engine = 12;
  string transmission = 13;
  string notes = 14;
  string image_url = 15; // optional uploaded photo of this car
}

message CreateCustomerRequest {
  string shop_id = 1;
  string phone = 2;
  string name = 3;
  avtoms.common.v1.Language language = 4;
  string telegram_handle = 5;
  bool walk_in = 6;
}

message GetCustomerRequest {
  string id = 1;
}
message UpdateCustomerRequest {
  string id = 1;
  string name = 2;
  string phone = 3;
  avtoms.common.v1.Language language = 4;
  string telegram_handle = 5;
  string notes = 6;
  string email = 7;
  string address = 8;
  string birthday = 9;
}

message CreateVehicleRequest {
  string customer_id = 1;
  string plate = 2;
  string vin = 3;
  string make = 4;
  string model = 5;
  int32 year = 6;
  int64 mileage = 7;
  PlateType plate_type = 8;
  string image_url = 9;
}

message GetVehicleRequest {
  string id = 1;
}
message UpdateVehicleRequest {
  string id = 1;
  string plate = 2;
  string vin = 3;
  string make = 4;
  string model = 5;
  int32 year = 6;
  int64 mileage = 7;
  PlateType plate_type = 8;
  string color = 9;
  string engine = 10;
  string transmission = 11;
  string notes = 12;
  string image_url = 13;
}
message DeleteVehicleRequest {
  string id = 1;
}

message ListVehiclesRequest {
  string customer_id = 1;
}
message ListVehiclesResponse {
  repeated Vehicle vehicles = 1;
}

message ListVehiclesByShopRequest {
  string shop_id = 1;
}

message SearchByPlateRequest {
  string shop_id = 1;
  string plate = 2;
}
message SearchByPlateResponse {
  repeated Vehicle vehicles = 1;
}

message SoftDeleteCustomerRequest {
  string id = 1;
}
