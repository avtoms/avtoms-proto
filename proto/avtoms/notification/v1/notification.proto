syntax = "proto3";

package avtoms.notification.v1;

import "avtoms/common/v1/common.proto";

option go_package = "github.com/avtoms/proto/gen/go/avtoms/notification/v1;notificationv1";

// NotificationService delivers messages to customers/staff across Telegram + SMS with fallback (M7 + M8).
service NotificationService {
  rpc SendSms(SendSmsRequest) returns (SendResponse);
  rpc SendTelegram(SendTelegramRequest) returns (SendResponse);
  // Notify picks the best channel (Telegram, falling back to SMS).
  rpc Notify(NotifyRequest) returns (SendResponse);

  // Integration credentials, managed by the super admin (e.g. the PlayMobile SMS gateway).
  rpc ListIntegrations(ListIntegrationsRequest) returns (ListIntegrationsResponse);
  rpc GetIntegration(GetIntegrationRequest) returns (Integration);
  rpc UpdateIntegration(UpdateIntegrationRequest) returns (Integration);
}

// Integration is a third-party provider's credential set. Secret values (password/token)
// are blanked on read; `configured` reports whether the provider has been set up.
message Integration {
  string provider = 1;            // e.g. "playmobile"
  map<string, string> values = 2; // key -> value; secret keys returned blank
  bool configured = 3;
}
message ListIntegrationsRequest {}
message ListIntegrationsResponse {
  repeated Integration integrations = 1;
}
message GetIntegrationRequest {
  string provider = 1;
}
message UpdateIntegrationRequest {
  string provider = 1;
  map<string, string> values = 2; // empty secret value keeps the stored one
}

enum Channel {
  CHANNEL_UNSPECIFIED = 0;
  CHANNEL_TELEGRAM = 1;
  CHANNEL_SMS = 2;
}

enum Template {
  TEMPLATE_UNSPECIFIED = 0;
  TEMPLATE_OTP = 1;
  TEMPLATE_MECHANIC_INVITE = 2;
  TEMPLATE_ESTIMATE = 3;
  TEMPLATE_READY_FOR_PICKUP = 4;
  TEMPLATE_RECEIPT = 5;
}

message SendResponse {
  string id = 1;
  Channel channel = 2;
  bool delivered = 3;
}

message SendSmsRequest {
  string shop_id = 1;
  string phone = 2;
  string body = 3;
}

message SendTelegramRequest {
  string shop_id = 1;
  string telegram_handle = 2;
  string body = 3;
}

message NotifyRequest {
  string shop_id = 1;
  string customer_id = 2;
  Template template = 3;
  avtoms.common.v1.Language language = 4;
  map<string, string> params = 5;
}
